<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ site.description }}">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <div class="nav-shell">
        <a class="brand" href="{{ '/' | relative_url }}" aria-label="Go to homepage">
          <span class="brand-name">{{ site.author.name }}</span>
          <span class="brand-subtitle">EIE | FPGA | Embedded Linux | SoC</span>
        </a>

        <nav class="site-nav" aria-label="Primary navigation">
          {% for item in site.navigation %}
            <a href="{{ item.url | relative_url }}">{{ item.title }}</a>
          {% endfor %}
        </nav>
      </div>
    </header>

    <main class="site-main">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div>
        <strong>{{ site.author.name }}</strong>
        <p>Imperial EIE student building FPGA, embedded Linux, and hardware/software systems.</p>
      </div>
      <div class="footer-links">
        <a href="https://github.com/{{ site.author.github }}">GitHub</a>
        <a href="mailto:{{ site.author.email }}">Email</a>
      </div>
    </footer>
  </body>
</html>
